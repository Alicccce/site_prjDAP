name: CI Tests

on:
  push:
    branches: [ diana ]
  pull_request:
    branches: [ diana ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Clean cache
        run: |
          rm -rf backend/hh_parser/__pycache__
          rm -rf tests/__pycache__
      
      - name: Run tests
        run: pytest tests/ -v
